<svg width="1120" height="430" viewBox="0 0 1120 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RPC 基础结构示意图</title>
  <desc id="desc">展示服务调用方、调用方本地存根、RPC Runtime、服务端本地存根和服务端之间的调用关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5597"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1f2937; }
      .label { font: 700 20px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1f2937; }
      .small { font: 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #4b5563; }
      .note { font: 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #374151; }
      .box-client { fill: #e8f2ff; stroke: #2f80ed; }
      .box-runtime { fill: #fff7e6; stroke: #d99000; }
      .box-server { fill: #eaf7ef; stroke: #219653; }
      .line { stroke: #2f5597; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .return-line { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="430" rx="16"/>
  <text class="title" x="560" y="48" text-anchor="middle">RPC 基础结构</text>

  <rect class="box-client" x="55" y="118" width="180" height="112" rx="12"/>
  <text class="label" x="145" y="162" text-anchor="middle">服务调用方</text>
  <text class="small" x="145" y="194" text-anchor="middle">业务代码发起调用</text>

  <rect class="box-client" x="280" y="118" width="190" height="112" rx="12"/>
  <text class="label" x="375" y="162" text-anchor="middle">调用方本地存根</text>
  <text class="small" x="375" y="194" text-anchor="middle">屏蔽远程调用细节</text>

  <rect class="box-runtime" x="515" y="102" width="210" height="144" rx="12"/>
  <text class="label" x="620" y="152" text-anchor="middle">RPC Runtime</text>
  <text class="small" x="620" y="186" text-anchor="middle">序列化 / 协议 / 网络传输</text>
  <text class="small" x="620" y="212" text-anchor="middle">连接、超时与异常处理</text>

  <rect class="box-server" x="770" y="118" width="190" height="112" rx="12"/>
  <text class="label" x="865" y="162" text-anchor="middle">服务端本地存根</text>
  <text class="small" x="865" y="194" text-anchor="middle">反序列化并分发请求</text>

  <rect class="box-server" x="1005" y="118" width="90" height="112" rx="12"/>
  <text class="label" x="1050" y="162" text-anchor="middle">服务端</text>
  <text class="small" x="1050" y="194" text-anchor="middle">执行业务</text>

  <path class="line" d="M235 174 H275"/>
  <path class="line" d="M470 174 H510"/>
  <path class="line" d="M725 174 H765"/>
  <path class="line" d="M960 174 H1000"/>

  <path class="return-line" d="M1005 282 H55"/>
  <text class="note" x="530" y="318" text-anchor="middle">返回结果沿相反方向经过服务端存根、RPC Runtime、调用方存根，最终回到调用方</text>

  <text class="note" x="560" y="374" text-anchor="middle">核心价值：像调用本地方法一样调用远程服务，同时由框架封装底层通信复杂度</text>
</svg>
