<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">需求排序示意图</title>
  <desc id="desc">用商业价值和时间紧迫度两个维度区分不同需求的优先级，并标注远景型、商业化型、急切型和低优先级需求。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#27364a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2a37" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#edf3f8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="0" fill="url(#bg)"/>

  <text x="600" y="64" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#172033">需求排序示意图</text>
  <text x="600" y="101" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#536173">用“商业价值”和“时间紧迫度”判断先做什么、后做什么，以及哪些需求需要保留在路线图中</text>

  <g transform="translate(160 150)">
    <rect x="0" y="0" width="880" height="500" rx="10" fill="#ffffff" stroke="#d8e1ea"/>

    <line x1="90" y1="420" x2="810" y2="420" stroke="#27364a" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="90" y1="420" x2="90" y2="70" stroke="#27364a" stroke-width="3" marker-end="url(#arrow)"/>

    <line x1="90" y1="245" x2="810" y2="245" stroke="#c7d2de" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="450" y1="70" x2="450" y2="420" stroke="#c7d2de" stroke-width="2" stroke-dasharray="8 8"/>

    <text x="450" y="470" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#27364a">商业价值 / 商业化要求</text>
    <text x="86" y="48" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#27364a">时间紧迫度</text>
    <text x="105" y="448" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#66758a">低</text>
    <text x="780" y="448" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#66758a">高</text>
    <text x="54" y="413" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#66758a">不急</text>
    <text x="54" y="86" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#66758a">急切</text>

    <g filter="url(#shadow)">
      <rect x="476" y="88" width="292" height="126" rx="8" fill="#e8f7ef" stroke="#52b788" stroke-width="2"/>
      <text x="622" y="124" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#1f7a4c">立即推进</text>
      <text x="622" y="158" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#2f6d50">高商业价值 + 高紧迫度</text>
      <text x="622" y="187" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#52606d">收入、合规、核心体验风险</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="132" y="88" width="292" height="126" rx="8" fill="#fff4df" stroke="#f0a83a" stroke-width="2"/>
      <text x="278" y="124" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#a55c00">谨慎插队</text>
      <text x="278" y="158" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#7d5a24">低商业价值 + 高紧迫度</text>
      <text x="278" y="187" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#52606d">投诉、临时活动、局部阻塞</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="476" y="276" width="292" height="126" rx="8" fill="#e7f0ff" stroke="#5b8def" stroke-width="2"/>
      <text x="622" y="312" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#2855b8">纳入路线图</text>
      <text x="622" y="346" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#345a9e">高商业价值 + 低紧迫度</text>
      <text x="622" y="375" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#52606d">远景、增长机会、能力建设</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="132" y="276" width="292" height="126" rx="8" fill="#f3f5f7" stroke="#a8b3bf" stroke-width="2"/>
      <text x="278" y="312" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#4d5a68">暂缓 / 放弃</text>
      <text x="278" y="346" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#5e6a78">低商业价值 + 低紧迫度</text>
      <text x="278" y="375" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#52606d">锦上添花、小众偏好、低影响</text>
    </g>
  </g>

  <g transform="translate(160 678)">
    <circle cx="15" cy="-7" r="7" fill="#52b788"/>
    <text x="30" y="-1" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#425166">先解决会直接影响收入、风险或关键路径的需求</text>
    <circle cx="405" cy="-7" r="7" fill="#5b8def"/>
    <text x="420" y="-1" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#425166">远景型需求不急于插队，但应进入规划和验证</text>
    <circle cx="800" cy="-7" r="7" fill="#f0a83a"/>
    <text x="815" y="-1" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#425166">紧急不等于重要，需判断商业化收益</text>
  </g>
</svg>
